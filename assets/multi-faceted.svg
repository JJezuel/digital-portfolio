<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280">

  <!-- ── CENTRAL GLOBE (cx=210, cy=105, r=52) ── -->
  <circle cx="210" cy="105" r="52" fill="rgba(255,255,255,0.1)" stroke="white" stroke-width="1.8" opacity="0.85"/>
  <!-- Equator latitude -->
  <ellipse cx="210" cy="105" rx="52" ry="17" fill="none" stroke="white" stroke-width="0.9" opacity="0.3"/>
  <!-- Longitude meridian -->
  <ellipse cx="210" cy="105" rx="26" ry="52" fill="none" stroke="white" stroke-width="0.9" opacity="0.25"/>
  <!-- Vertical axis -->
  <line x1="210" y1="53" x2="210" y2="157" stroke="white" stroke-width="0.9" opacity="0.25"/>

  <!-- ── LANGUAGE PILLS — symmetric cross layout ── -->
  <!-- EN (left) -->
  <line x1="158" y1="105" x2="130" y2="105" stroke="white" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <rect x="72" y="92" width="56" height="26" rx="13" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1" opacity="0.65"/>
  <text x="100" y="109" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.93">EN</text>

  <!-- NL (top) -->
  <line x1="210" y1="53" x2="210" y2="36" stroke="white" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <rect x="182" y="10" width="56" height="26" rx="13" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1" opacity="0.65"/>
  <text x="210" y="27" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.93">NL</text>

  <!-- ES (right) -->
  <line x1="262" y1="105" x2="292" y2="105" stroke="white" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <rect x="292" y="92" width="56" height="26" rx="13" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1" opacity="0.65"/>
  <text x="320" y="109" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.93">ES</text>

  <!-- PAP (bottom) -->
  <line x1="210" y1="157" x2="210" y2="178" stroke="white" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <rect x="179" y="178" width="62" height="26" rx="13" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1" opacity="0.65"/>
  <text x="210" y="195" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.93">PAP</text>

  <!-- ── PIANO KEYS (bottom strip) ── -->
  <!-- 7 white keys -->
  <rect x="30"  y="216" width="46" height="52" rx="3" fill="rgba(255,255,255,0.78)"/>
  <rect x="80"  y="216" width="46" height="52" rx="3" fill="rgba(255,255,255,0.78)"/>
  <rect x="130" y="216" width="46" height="52" rx="3" fill="rgba(255,255,255,0.78)"/>
  <rect x="180" y="216" width="46" height="52" rx="3" fill="rgba(255,255,255,0.78)"/>
  <rect x="230" y="216" width="46" height="52" rx="3" fill="rgba(255,255,255,0.78)"/>
  <rect x="280" y="216" width="46" height="52" rx="3" fill="rgba(255,255,255,0.78)"/>
  <rect x="330" y="216" width="46" height="52" rx="3" fill="rgba(255,255,255,0.78)"/>
  <!-- Black keys (C#, D#, F#, G#, A#) -->
  <rect x="62"  y="216" width="28" height="34" rx="2" fill="rgba(15,23,42,0.82)"/>
  <rect x="112" y="216" width="28" height="34" rx="2" fill="rgba(15,23,42,0.82)"/>
  <rect x="212" y="216" width="28" height="34" rx="2" fill="rgba(15,23,42,0.82)"/>
  <rect x="262" y="216" width="28" height="34" rx="2" fill="rgba(15,23,42,0.82)"/>
  <rect x="312" y="216" width="28" height="34" rx="2" fill="rgba(15,23,42,0.82)"/>
  <!-- Dividers between white keys -->
  <line x1="80"  y1="216" x2="80"  y2="268" stroke="rgba(27,43,71,0.2)" stroke-width="1"/>
  <line x1="130" y1="216" x2="130" y2="268" stroke="rgba(27,43,71,0.2)" stroke-width="1"/>
  <line x1="180" y1="216" x2="180" y2="268" stroke="rgba(27,43,71,0.2)" stroke-width="1"/>
  <line x1="230" y1="216" x2="230" y2="268" stroke="rgba(27,43,71,0.2)" stroke-width="1"/>
  <line x1="280" y1="216" x2="280" y2="268" stroke="rgba(27,43,71,0.2)" stroke-width="1"/>
  <line x1="330" y1="216" x2="330" y2="268" stroke="rgba(27,43,71,0.2)" stroke-width="1"/>

</svg>
