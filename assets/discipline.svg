<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280">

  <!-- Panel backgrounds (2x2 grid) -->
  <rect x="16" y="16" width="188" height="118" rx="10" fill="rgba(255,255,255,0.13)"/>
  <rect x="216" y="16" width="188" height="118" rx="10" fill="rgba(255,255,255,0.13)"/>
  <rect x="16" y="146" width="188" height="118" rx="10" fill="rgba(255,255,255,0.13)"/>
  <rect x="216" y="146" width="188" height="118" rx="10" fill="rgba(255,255,255,0.13)"/>

  <!-- BADMINTON (TL, icon centre 110,62) -->
  <g transform="translate(110,62)">
    <ellipse cx="0" cy="-12" rx="17" ry="21" fill="none" stroke="white" stroke-width="2" opacity="0.85"/>
    <line x1="-14" y1="-18" x2="14" y2="-18" stroke="white" stroke-width="0.8" opacity="0.4"/>
    <line x1="-17" y1="-12" x2="17" y2="-12" stroke="white" stroke-width="0.8" opacity="0.4"/>
    <line x1="-15" y1="-6"  x2="15" y2="-6"  stroke="white" stroke-width="0.8" opacity="0.4"/>
    <line x1="-11" y1="0"   x2="11" y2="0"   stroke="white" stroke-width="0.8" opacity="0.4"/>
    <line x1="-8"  y1="-33" x2="-8"  y2="2"  stroke="white" stroke-width="0.8" opacity="0.4"/>
    <line x1="0"   y1="-33" x2="0"   y2="4"  stroke="white" stroke-width="0.8" opacity="0.4"/>
    <line x1="8"   y1="-33" x2="8"   y2="2"  stroke="white" stroke-width="0.8" opacity="0.4"/>
    <rect x="-2.5" y="8"  width="5" height="6"  rx="1.5" fill="white" opacity="0.8"/>
    <rect x="-2.5" y="14" width="5" height="26" rx="2.5" fill="white" opacity="0.85"/>
    <!-- Shuttlecock -->
    <g transform="translate(26,-38)">
      <circle r="4" fill="white" opacity="0.9"/>
      <line x1="-4" y1="-4" x2="-7" y2="-14" stroke="white" stroke-width="1.3" opacity="0.65"/>
      <line x1="0"  y1="-4" x2="0"  y2="-15" stroke="white" stroke-width="1.3" opacity="0.65"/>
      <line x1="4"  y1="-4" x2="6"  y2="-14" stroke="white" stroke-width="1.3" opacity="0.65"/>
      <path d="M-7,-14 Q0,-18 6,-14" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
    </g>
  </g>
  <text x="110" y="114" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="white" opacity="0.75" letter-spacing="0.07em">BADMINTON</text>

  <!-- DUMBBELL / GYM (TR, icon centre 310,62) -->
  <g transform="translate(310,62)">
    <rect x="-23" y="-3.5" width="46" height="7" rx="3.5" fill="white" opacity="0.9"/>
    <rect x="-35" y="-13"  width="11"  height="26" rx="4" fill="white" opacity="0.85"/>
    <rect x="-47" y="-17"  width="10"  height="34" rx="4" fill="white" opacity="0.6"/>
    <rect x="24"  y="-13"  width="11"  height="26" rx="4" fill="white" opacity="0.85"/>
    <rect x="37"  y="-17"  width="10"  height="34" rx="4" fill="white" opacity="0.6"/>
  </g>
  <text x="310" y="114" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="white" opacity="0.75" letter-spacing="0.07em">GYM</text>

  <!-- GOLF (BL, icon centre 110,195) -->
  <g transform="translate(110,195)">
    <line x1="-55" y1="28" x2="55" y2="28" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <line x1="6" y1="-30" x2="6" y2="28" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <polygon points="6,-30 31,-18 6,-6" fill="white" opacity="0.9"/>
    <ellipse cx="6" cy="28" rx="14" ry="5" fill="rgba(0,0,0,0.2)"/>
    <circle cx="-28" cy="22" r="5" fill="white" opacity="0.9"/>
    <circle cx="-29.5" cy="21" r="1.2" fill="rgba(168,196,223,0.55)"/>
    <circle cx="-26" cy="24" r="1.2" fill="rgba(168,196,223,0.55)"/>
    <circle cx="-27" cy="20" r="1.2" fill="rgba(168,196,223,0.55)"/>
  </g>
  <text x="110" y="244" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="white" opacity="0.75" letter-spacing="0.07em">GOLF</text>

  <!-- MEDITATION (BR, icon centre 310,192) — two shapes: head + lotus base -->
  <g transform="translate(310,192)">
    <circle cy="-22" r="12" fill="white" opacity="0.9"/>
    <ellipse cy="12" rx="34" ry="12" fill="white" opacity="0.85"/>
  </g>
  <text x="310" y="244" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="white" opacity="0.75" letter-spacing="0.07em">MEDITATION</text>

</svg>
